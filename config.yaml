env:
  scene_xml_path: "models/reach_scene.xml"
  target_x_range: [-0.13, 0.13]
  target_y_range: [-0.20, 0.20]
  target_z_range: [0.10, 0.20]
  reach_threshold: 0.025

expert:
  dt: 0.002
  solver: "daqp"
  max_iters: 10
  ik_pos_threshold: 0.005

renderer:
  height: 480
  width: 640

collection:
  n_episodes: 200
  n_steps: 1000
  dataset_dir: "data/reach"
  log_file: "logs/data_gathering.log"
  render_cameras:
    - "overhead_cam"
    - "ego_cam"
  hf_repo_id: "jgilewicz/act_reach_env"

training:
  action_dim: 6
  embed_dim: 256
  latent_dim: 128
  joint_dim: 6
  nhead: 8
  num_layers: 4
  num_cameras: 2
  beta: 0.05
  chunk_size: 50
  batch_size: 64
  val_ratio: 0.1
  num_workers: 8
  max_steps: 50000
  warmup_steps: 1000
  log_interval: 1000
  save_interval: 10000
  lr: 0.00015

distillation:
  embed_dim: 128
  latent_dim: 64
  num_layers: 2
  nhead: 4
  temperature: 2.0
  alpha: 0.5
  gamma: 0.2
  teacher_latent_dim: 128
  teacher_hf_repo_id: "jgilewicz/distil_act_teacher"
  teacher_hf_filename: "act_model_final.pt"
  teacher_checkpoint: "artifacts/act_model_final.pt" 

eval:
  checkpoint: "artifacts/distil_act_model_step_10000.pt"
  seed: 1
  video_path: "video/eval.mp4"

wandb:
  project: "distil_act"
  entity: "jg_projects"

hf:
  hf_repo_id: "jgilewicz/distil_act_student"
  hf_filename: "distil_act_model_step_10000.pt"
  checkpoint: "artifacts/distil_act_model_step_10000.pt"
